name: sankatmitra_ambulance
description: SankatMitra - Ambulance Emergency Corridor App
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  google_maps_flutter: ^2.5.0
  cupertino_icons: ^1.0.6
  geolocator: ^11.0.0
  flutter_local_notifications: ^16.0.0
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  dio: ^5.3.0
  web_socket_channel: ^2.4.0
  flutter_secure_storage: ^9.0.0
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/
